name: Current Build Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: CURRENT_BUILD_TEST
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build current branch
        run: npm run build

      - name: Emit build test artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          @(
            "CURRENT_BUILD_TEST=PASS"
            "commit=$env:GITHUB_SHA"
            "branch=$env:GITHUB_REF_NAME"
            "event=$env:GITHUB_EVENT_NAME"
            "generated_at=$((Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ'))"
          ) | Set-Content -Path current-build-test.txt

      - name: Upload build test artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-build-test-${{ github.sha }}
          path: current-build-test.txt
          if-no-files-found: error
