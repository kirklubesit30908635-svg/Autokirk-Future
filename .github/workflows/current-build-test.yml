name: Current Build Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

actions: {}

jobs:
  build:
    name: CURRENT_BUILD_TEST
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build current branch
        run: npm run build

      - name: Emit build test artifact
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "CURRENT_BUILD_TEST=PASS"
            echo "commit=${GITHUB_SHA}"
            echo "branch=${GITHUB_REF_NAME}"
            echo "event=${GITHUB_EVENT_NAME}"
            date -u +"generated_at=%Y-%m-%dT%H:%M:%SZ"
          } > current-build-test.txt

      - name: Upload build test artifact
        uses: actions/upload-artifact@v4
        with:
          name: current-build-test-${{ github.sha }}
          path: current-build-test.txt
          if-no-files-found: error
