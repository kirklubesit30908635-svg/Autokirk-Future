# AutoKirk Future — Sealed Proof Gate
#
# Target path in repo: .github/workflows/proof.yml
#
# Demonstrates the active AutoKirk build standard:
#   No proof -> no closure.
#   No proof -> no deploy.
#
# Required repo secrets for live checks:
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF          # aiuicbyufelqdeiwhmyi
#   VERCEL_TOKEN
#   VERCEL_TEAM_ID                # team_OV8eAQoyzC70YMyjsAsc2MC6
#   VERCEL_PROJECT_ID             # prj_lJhyFrdcF6qOokBzf2cNVuMyhWoh
#
# Sealed markers exercised by `npm run prove`:
#   TERMINAL_STATE_VERIFICATION_OK
#   OVERDUE_FAILURE_VERIFICATION_MANUAL_OK
#   SYSTEM_TRUTH_VERIFICATION_OK
#   GUARD_VERIFICATION_OK
#   SIGNALS_VERIFICATION_OK

name: AutoKirk Future Proof Gate

on:
  push:
    branches:
      - main
      - recover/local-work-after-sync
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Avoid stacked runs on rapid pushes — newer push cancels older job.
concurrency:
  group: prove-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    name: AUTOKIRK_PROOF_GATE_OK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Local Supabase boots Postgres + Edge runtime in Docker.
      # GitHub-hosted runners include Docker by default.
      - name: Start local Supabase stack
        id: supabase_start
        run: supabase start

      - name: Apply all migrations to local DB
        id: supabase_replay
        run: supabase db reset --local

      - name: Run sealed proof markers
        id: prove
        shell: bash
        run: |
          set -euo pipefail
          npm run prove | tee prove-output.txt

          grep -q 'TERMINAL_STATE_VERIFICATION_OK' prove-output.txt
          grep -q 'OVERDUE_FAILURE_VERIFICATION_MANUAL_OK' prove-output.txt
          grep -q 'SYSTEM_TRUTH_VERIFICATION_OK' prove-output.txt
          grep -q 'GUARD_VERIFICATION_OK' prove-output.txt
          grep -q 'SIGNALS_VERIFICATION_OK' prove-output.txt

      - name: Check live Supabase security advisor
        if: github.event_name != 'pull_request'
        id: supabase_security
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF secret" >&2
            exit 1
          fi

          curl -fsS \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/advisors/security" \
            -o supabase-security.json

          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('supabase-security.json', 'utf8'));
          const lints = Array.isArray(payload.lints)
            ? payload.lints
            : Array.isArray(payload.result?.lints)
              ? payload.result.lints
              : [];
          const blocking = lints.filter((lint) => ['ERROR', 'WARN'].includes(String(lint.level || '').toUpperCase()));
          if (blocking.length) {
            console.error(JSON.stringify(blocking, null, 2));
            process.exit(1);
          }
          NODE

      - name: Check Vercel production deployment alignment
        if: github.event_name != 'pull_request'
        id: vercel_ready
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPECTED_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_TOKEN:-}" ] || [ -z "${VERCEL_TEAM_ID:-}" ] || [ -z "${VERCEL_PROJECT_ID:-}" ]; then
            echo "Missing VERCEL_TOKEN, VERCEL_TEAM_ID, or VERCEL_PROJECT_ID secret" >&2
            exit 1
          fi

          for attempt in $(seq 1 30); do
            curl -fsS \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" \
              "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_TEAM_ID}&target=production&limit=20" \
              -o vercel-deployments.json

            node <<'NODE' && exit 0 || status=$?
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('vercel-deployments.json', 'utf8'));
            const expectedSha = process.env.EXPECTED_SHA;
            const deployments = payload.deployments || [];
            const match = deployments.find((deployment) => deployment.meta?.githubCommitSha === expectedSha);
            if (!match) {
              console.error(`No production deployment found yet for ${expectedSha}.`);
              process.exit(2);
            }
            if (match.state !== 'READY') {
              console.error(`Production deployment ${match.id} for ${expectedSha} is ${match.state}, not READY yet.`);
              process.exit(3);
            }
            fs.writeFileSync('vercel-ready.txt', `${match.id}\n`);
            NODE

            if [ "$status" -ne 2 ] && [ "$status" -ne 3 ]; then
              exit "$status"
            fi
            echo "Waiting for Vercel production deployment for ${EXPECTED_SHA}; attempt ${attempt}/30"
            sleep 10
          done

          echo "Timed out waiting for Vercel production deployment for ${EXPECTED_SHA}" >&2
          exit 1

      - name: Emit AutoKirk proof gate summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          npm_run_prove="FAIL"
          terminal_state="FAIL"
          overdue_failure="FAIL"
          system_truth="FAIL"
          guards="FAIL"
          signals="FAIL"
          security_advisor="SKIPPED"
          vercel_deployment_ready="SKIPPED"
          supabase_local_replay="FAIL"

          if [ "${{ steps.supabase_replay.outcome || 'failure' }}" = "success" ]; then
            supabase_local_replay="PASS"
          fi

          if [ -f prove-output.txt ]; then
            grep -q 'TERMINAL_STATE_VERIFICATION_OK' prove-output.txt && terminal_state="PASS"
            grep -q 'OVERDUE_FAILURE_VERIFICATION_MANUAL_OK' prove-output.txt && overdue_failure="PASS"
            grep -q 'SYSTEM_TRUTH_VERIFICATION_OK' prove-output.txt && system_truth="PASS"
            grep -q 'GUARD_VERIFICATION_OK' prove-output.txt && guards="PASS"
            grep -q 'SIGNALS_VERIFICATION_OK' prove-output.txt && signals="PASS"
            if [ "$terminal_state" = "PASS" ] && [ "$overdue_failure" = "PASS" ] && [ "$system_truth" = "PASS" ] && [ "$guards" = "PASS" ] && [ "$signals" = "PASS" ]; then
              npm_run_prove="PASS"
            fi
          fi

          if [ "${{ steps.supabase_security.outcome || 'skipped' }}" = "success" ]; then
            security_advisor="PASS"
          elif [ "${{ steps.supabase_security.outcome || 'skipped' }}" = "failure" ]; then
            security_advisor="FAIL"
          fi

          if [ "${{ steps.vercel_ready.outcome || 'skipped' }}" = "success" ]; then
            vercel_deployment_ready="PASS"
          elif [ "${{ steps.vercel_ready.outcome || 'skipped' }}" = "failure" ]; then
            vercel_deployment_ready="FAIL"
          fi

          {
            echo "AUTOKIRK_PROOF_GATE_OK"
            echo
            echo "commit: ${GITHUB_SHA}"
            echo "supabase_local_replay: ${supabase_local_replay}"
            echo "npm_run_prove: ${npm_run_prove}"
            echo "terminal_state: ${terminal_state}"
            echo "overdue_failure: ${overdue_failure}"
            echo "system_truth: ${system_truth}"
            echo "guards: ${guards}"
            echo "signals: ${signals}"
            echo "security_advisor: ${security_advisor}"
            echo "vercel_deployment_ready: ${vercel_deployment_ready}"
          } | tee autokirk-proof-gate-summary.txt

          cat autokirk-proof-gate-summary.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proof gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autokirk-proof-gate-${{ github.sha }}
          path: |
            prove-output.txt
            autokirk-proof-gate-summary.txt
            supabase-security.json
            vercel-deployments.json
            vercel-ready.txt
          if-no-files-found: ignore

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
