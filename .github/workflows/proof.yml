# AutoKirk Future — Strict Sealed Proof Gate
#
# Target path in repo: .github/workflows/proof.yml
#
# Doctrine:
#   No proof -> no closure.
#   No proof -> no deploy.
#   No ambiguous release receipt.
#   No production release receipt without live Supabase and Vercel verification.
#   Failed proofs still emit evidence artifacts.
#
# Required repo secrets for push/main production release checks:
#   SUPABASE_ACCESS_TOKEN
#   SUPABASE_PROJECT_REF          # aiuicbyufelqdeiwhmyi
#   VERCEL_TOKEN
#   VERCEL_TEAM_ID                # team_OV8eAQoyzC70YMyjsAsc2MC6
#   VERCEL_PROJECT_ID             # prj_lJhyFrdcF6qOokBzf2cNVuMyhWoh
#
# Required local runner capabilities:
#   Windows self-hosted runner online
#   Node available through setup-node
#   Docker Desktop running for Supabase local stack
#   PowerShell available
#
# Sealed markers exercised by `npm run prove`:
#   TERMINAL_STATE_VERIFICATION_OK
#   OVERDUE_FAILURE_VERIFICATION_MANUAL_OK
#   SYSTEM_TRUTH_VERIFICATION_OK
#   GUARD_VERIFICATION_OK
#   SIGNALS_VERIFICATION_OK

name: AutoKirk Future Proof Gate

on:
  push:
    branches:
      - main
      - recover/local-work-after-sync
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prove-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    name: AUTOKIRK_PROOF_GATE_OK
    runs-on: self-hosted
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm ci

      - name: Build canonical app
        id: npm_build
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        id: supabase_start
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          supabase start

      - name: Apply all migrations to local DB
        id: supabase_replay
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          supabase db reset --local

      - name: Run sealed proof markers
        id: prove_markers
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          npm run prove | Tee-Object -FilePath prove-output.txt

          $proof = Get-Content -Raw -Path prove-output.txt

          $requiredMarkers = @(
            "TERMINAL_STATE_VERIFICATION_OK",
            "OVERDUE_FAILURE_VERIFICATION_MANUAL_OK",
            "SYSTEM_TRUTH_VERIFICATION_OK",
            "GUARD_VERIFICATION_OK",
            "SIGNALS_VERIFICATION_OK"
          )

          foreach ($marker in $requiredMarkers) {
            if ($proof -notlike "*$marker*") {
              throw "Missing sealed proof marker: $marker"
            }
          }

      - name: Check live Supabase security advisor
        if: github.event_name != 'pull_request'
        id: supabase_security
        shell: pwsh
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:SUPABASE_ACCESS_TOKEN) {
            throw "Missing SUPABASE_ACCESS_TOKEN secret"
          }

          if (-not $env:SUPABASE_PROJECT_REF) {
            throw "Missing SUPABASE_PROJECT_REF secret"
          }

          $headers = @{
            Authorization = "Bearer $env:SUPABASE_ACCESS_TOKEN"
            "Content-Type" = "application/json"
          }

          $url = "https://api.supabase.com/v1/projects/$env:SUPABASE_PROJECT_REF/advisors/security"

          Invoke-RestMethod -Uri $url -Headers $headers -Method Get |
            ConvertTo-Json -Depth 20 |
            Set-Content -Path supabase-security.json

          node -e "
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('supabase-security.json', 'utf8'));
          const lints = Array.isArray(payload.lints)
            ? payload.lints
            : Array.isArray(payload.result?.lints)
              ? payload.result.lints
              : [];
          const blocking = lints.filter((lint) =>
            ['ERROR', 'WARN'].includes(String(lint.level || '').toUpperCase())
          );
          if (blocking.length) {
            console.error(JSON.stringify(blocking, null, 2));
            process.exit(1);
          }
          "

      - name: Check Vercel production deployment alignment
        if: github.event_name != 'pull_request'
        id: vercel_ready
        shell: pwsh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          $ErrorActionPreference = "Stop"

          if (-not $env:VERCEL_TOKEN) {
            throw "Missing VERCEL_TOKEN secret"
          }

          if (-not $env:VERCEL_TEAM_ID) {
            throw "Missing VERCEL_TEAM_ID secret"
          }

          if (-not $env:VERCEL_PROJECT_ID) {
            throw "Missing VERCEL_PROJECT_ID secret"
          }

          $headers = @{
            Authorization = "Bearer $env:VERCEL_TOKEN"
          }

          $url = "https://api.vercel.com/v6/deployments?projectId=$env:VERCEL_PROJECT_ID&teamId=$env:VERCEL_TEAM_ID&target=production&limit=20"

          $matched = $false

          for ($attempt = 1; $attempt -le 30; $attempt++) {
            Invoke-RestMethod -Uri $url -Headers $headers -Method Get |
              ConvertTo-Json -Depth 20 |
              Set-Content -Path vercel-deployments.json

            node -e "
            const fs = require('fs');
            const payload = JSON.parse(fs.readFileSync('vercel-deployments.json', 'utf8'));
            const expectedSha = process.env.EXPECTED_SHA;
            const deployments = payload.deployments || [];
            const match = deployments.find((deployment) => deployment.meta?.githubCommitSha === expectedSha);

            if (!match) {
              console.error(`No production deployment found yet for ${expectedSha}.`);
              process.exit(2);
            }

            if (match.state !== 'READY') {
              console.error(`Production deployment ${match.id} for ${expectedSha} is ${match.state}, not READY yet.`);
              process.exit(3);
            }

            fs.writeFileSync('vercel-ready.txt', `${match.id}\n`);
            "

            if ($LASTEXITCODE -eq 0) {
              $matched = $true
              break
            }

            if ($LASTEXITCODE -ne 2 -and $LASTEXITCODE -ne 3) {
              throw "Vercel deployment alignment check failed with exit code $LASTEXITCODE"
            }

            Write-Host "Waiting for Vercel production deployment for $env:EXPECTED_SHA; attempt $attempt/30"
            Start-Sleep -Seconds 10
          }

          if (-not $matched) {
            throw "Timed out waiting for Vercel production deployment for $env:EXPECTED_SHA"
          }

      - name: Emit strict AutoKirk proof gate receipt
        if: always()
        id: receipt
        shell: pwsh
        env:
          NPM_BUILD_OUTCOME: ${{ steps.npm_build.outcome || 'failure' }}
          SUPABASE_REPLAY_OUTCOME: ${{ steps.supabase_replay.outcome || 'failure' }}
          PROVE_MARKERS_OUTCOME: ${{ steps.prove_markers.outcome || 'failure' }}
          SUPABASE_SECURITY_OUTCOME: ${{ steps.supabase_security.outcome || 'skipped' }}
          VERCEL_READY_OUTCOME: ${{ steps.vercel_ready.outcome || 'skipped' }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
        run: |
          $ErrorActionPreference = "Stop"

          node -e "
          const fs = require('fs');
          const crypto = require('crypto');

          const env = process.env;
          const read = (path) => fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : '';
          const proofOutput = read('prove-output.txt');
          const has = (marker) => proofOutput.includes(marker);
          const status = (ok) => ok ? 'PASS' : 'FAIL';

          const checks = {
            npm_build: status(env.NPM_BUILD_OUTCOME === 'success'),
            supabase_local_replay: status(env.SUPABASE_REPLAY_OUTCOME === 'success'),
            npm_run_prove: 'FAIL',
            terminal_state: status(has('TERMINAL_STATE_VERIFICATION_OK')),
            overdue_failure: status(has('OVERDUE_FAILURE_VERIFICATION_MANUAL_OK')),
            system_truth: status(has('SYSTEM_TRUTH_VERIFICATION_OK')),
            guards: status(has('GUARD_VERIFICATION_OK')),
            signals: status(has('SIGNALS_VERIFICATION_OK')),
            security_advisor: env.GITHUB_EVENT_NAME === 'pull_request'
              ? 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY'
              : status(env.SUPABASE_SECURITY_OUTCOME === 'success'),
            vercel_deployment_ready: env.GITHUB_EVENT_NAME === 'pull_request'
              ? 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY'
              : status(env.VERCEL_READY_OUTCOME === 'success')
          };

          checks.npm_run_prove = status([
            checks.terminal_state,
            checks.overdue_failure,
            checks.system_truth,
            checks.guards,
            checks.signals
          ].every((value) => value === 'PASS'));

          const localProofPassed = [
            checks.npm_build,
            checks.supabase_local_replay,
            checks.npm_run_prove,
            checks.terminal_state,
            checks.overdue_failure,
            checks.system_truth,
            checks.guards,
            checks.signals
          ].every((value) => value === 'PASS');

          const productionProofRequired = env.GITHUB_EVENT_NAME !== 'pull_request';
          const productionProofPassed = !productionProofRequired || (
            checks.security_advisor === 'PASS' && checks.vercel_deployment_ready === 'PASS'
          );

          const receiptStatus = localProofPassed && productionProofPassed ? 'PASS' : 'FAIL';
          const receiptKind = productionProofRequired ? 'production_release' : 'pull_request_proof';
          const vercelDeploymentId = fs.existsSync('vercel-ready.txt')
            ? fs.readFileSync('vercel-ready.txt', 'utf8').trim()
            : null;

          const receipt = {
            schema: 'autokirk.release_receipt.v3.windows_self_hosted',
            doctrine: 'no_proof_no_closure_no_proof_no_deploy',
            receipt_id: `${receiptKind}:${env.GITHUB_REPOSITORY}:${env.GITHUB_SHA}:${env.GITHUB_RUN_ID}:${env.GITHUB_RUN_ATTEMPT}`,
            receipt_kind: receiptKind,
            status: receiptStatus,
            generated_at: new Date().toISOString(),
            repository: env.GITHUB_REPOSITORY,
            branch: env.GITHUB_REF_NAME,
            event_name: env.GITHUB_EVENT_NAME,
            run_id: env.GITHUB_RUN_ID,
            run_attempt: env.GITHUB_RUN_ATTEMPT,
            commit: env.GITHUB_SHA,
            actor: env.GITHUB_ACTOR,
            checks,
            production_authority: {
              required: productionProofRequired,
              supabase_security_advisor_required: productionProofRequired,
              vercel_ready_required: productionProofRequired,
              vercel_deployment_id: vercelDeploymentId
            },
            artifacts: {
              proof_output: fs.existsSync('prove-output.txt') ? 'prove-output.txt' : null,
              summary: 'autokirk-proof-gate-summary.txt',
              receipt: 'autokirk-release-receipt.json',
              receipt_status: 'autokirk-receipt-status.txt',
              supabase_security: fs.existsSync('supabase-security.json') ? 'supabase-security.json' : null,
              vercel_deployments: fs.existsSync('vercel-deployments.json') ? 'vercel-deployments.json' : null,
              vercel_ready: fs.existsSync('vercel-ready.txt') ? 'vercel-ready.txt' : null
            },
            live_targets: {
              supabase_project_ref_configured: Boolean(env.SUPABASE_PROJECT_REF),
              vercel_project_id_configured: Boolean(env.VERCEL_PROJECT_ID),
              vercel_team_id_configured: Boolean(env.VERCEL_TEAM_ID)
            }
          };

          const canonicalForHash = JSON.stringify(receipt);
          receipt.receipt_hash = crypto.createHash('sha256').update(canonicalForHash).digest('hex');

          const summaryLines = [
            'AUTOKIRK_PROOF_GATE_OK',
            '',
            `commit: ${env.GITHUB_SHA}`,
            `npm_build: ${checks.npm_build}`,
            `supabase_local_replay: ${checks.supabase_local_replay}`,
            `npm_run_prove: ${checks.npm_run_prove}`,
            `terminal_state: ${checks.terminal_state}`,
            `overdue_failure: ${checks.overdue_failure}`,
            `system_truth: ${checks.system_truth}`,
            `guards: ${checks.guards}`,
            `signals: ${checks.signals}`,
            `security_advisor: ${checks.security_advisor}`,
            `vercel_deployment_ready: ${checks.vercel_deployment_ready}`,
            `receipt_kind: ${receiptKind}`,
            `receipt_status: ${receiptStatus}`,
            `receipt_hash: ${receipt.receipt_hash}`
          ];

          fs.writeFileSync('autokirk-proof-gate-summary.txt', summaryLines.join('\n') + '\n');
          fs.writeFileSync('autokirk-release-receipt.json', JSON.stringify(receipt, null, 2) + '\n');
          fs.writeFileSync('autokirk-receipt-status.txt', receiptStatus + '\n');

          if (env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(env.GITHUB_STEP_SUMMARY, summaryLines.join('\n') + '\n');
          }
          "

      - name: Upload proof gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autokirk-proof-gate-${{ github.sha }}
          path: |
            prove-output.txt
            autokirk-proof-gate-summary.txt
            autokirk-release-receipt.json
            autokirk-receipt-status.txt
            supabase-security.json
            vercel-deployments.json
            vercel-ready.txt
          if-no-files-found: ignore

      - name: Enforce strict AutoKirk proof result
        if: always()
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (-not (Test-Path -Path autokirk-receipt-status.txt)) {
            throw "Missing AutoKirk release receipt status artifact"
          }

          $status = (Get-Content -Raw -Path autokirk-receipt-status.txt).Trim()

          if ($status -ne "PASS") {
            Write-Error "AutoKirk proof gate did not produce a PASS receipt"
            if (Test-Path -Path autokirk-release-receipt.json) {
              Get-Content -Raw -Path autokirk-release-receipt.json | Write-Error
            }
            exit 1
          }

      - name: Stop local Supabase stack
        if: always()
        shell: pwsh
        run: |
          supabase stop --no-backup
