# AutoKirk Future — Strict Sealed Proof Gate
#
# Doctrine:
#   No proof -> no closure.
#   No proof -> no deploy.
#   Pull requests prove local replay/build/proof markers.
#   Main pushes additionally prove live Supabase/Vercel release authority.

name: AutoKirk Future Proof Gate

on:
  push:
    branches:
      - main
      - recover/local-work-after-sync
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: prove-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    name: AUTOKIRK_PROOF_GATE_OK
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase stack
        id: supabase_start
        run: supabase start

      - name: Apply all migrations to local DB
        id: supabase_replay
        run: supabase db reset --local

      - name: Run sealed proof markers
        id: prove_markers
        shell: bash
        run: |
          set -euo pipefail
          npm run prove | tee prove-output.txt

          grep -q 'TERMINAL_STATE_VERIFICATION_OK' prove-output.txt
          grep -q 'OVERDUE_FAILURE_VERIFICATION_MANUAL_OK' prove-output.txt
          grep -q 'SYSTEM_TRUTH_VERIFICATION_OK' prove-output.txt
          grep -q 'GUARD_VERIFICATION_OK' prove-output.txt
          grep -q 'SIGNALS_VERIFICATION_OK' prove-output.txt

      - name: Check live Supabase security advisor
        if: github.event_name != 'pull_request'
        id: supabase_security
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        shell: bash
        run: |
          set -euo pipefail
          : "${SUPABASE_ACCESS_TOKEN:?Missing SUPABASE_ACCESS_TOKEN secret}"
          : "${SUPABASE_PROJECT_REF:?Missing SUPABASE_PROJECT_REF secret}"

          curl -fsS \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/advisors/security" \
            -o supabase-security.json

          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('supabase-security.json', 'utf8'));
          const lints = Array.isArray(payload.lints)
            ? payload.lints
            : Array.isArray(payload.result?.lints)
              ? payload.result.lints
              : [];
          const blocking = lints.filter((lint) => ['ERROR', 'WARN'].includes(String(lint.level || '').toUpperCase()));
          if (blocking.length) {
            console.error(JSON.stringify(blocking, null, 2));
            process.exit(1);
          }
          NODE

      - name: Check Vercel production deployment alignment
        if: github.event_name != 'pull_request'
        id: vercel_ready
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          EXPECTED_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          : "${VERCEL_TOKEN:?Missing VERCEL_TOKEN secret}"
          : "${VERCEL_TEAM_ID:?Missing VERCEL_TEAM_ID secret}"
          : "${VERCEL_PROJECT_ID:?Missing VERCEL_PROJECT_ID secret}"

          curl -fsS \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            "https://api.vercel.com/v6/deployments?projectId=${VERCEL_PROJECT_ID}&teamId=${VERCEL_TEAM_ID}&target=production&limit=20" \
            -o vercel-deployments.json

          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('vercel-deployments.json', 'utf8'));
          const expectedSha = process.env.EXPECTED_SHA;
          const deployments = payload.deployments || [];
          const match = deployments.find((deployment) => deployment.meta?.githubCommitSha === expectedSha);
          if (!match) {
            console.error(`No production deployment found for ${expectedSha}.`);
            process.exit(1);
          }
          if (match.state !== 'READY') {
            console.error(`Production deployment ${match.id} for ${expectedSha} is ${match.state}, not READY.`);
            process.exit(1);
          }
          fs.writeFileSync('vercel-ready.txt', `${match.id}\n`);
          NODE

      - name: Emit AutoKirk proof gate receipt
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');

          const env = process.env;
          const proofOutput = fs.existsSync('prove-output.txt') ? fs.readFileSync('prove-output.txt', 'utf8') : '';
          const has = (marker) => proofOutput.includes(marker);
          const pass = (ok) => ok ? 'PASS' : 'FAIL';
          const pullRequest = env.GITHUB_EVENT_NAME === 'pull_request';

          const checks = {
            npm_build: pass(true),
            supabase_local_replay: pass(fs.existsSync('prove-output.txt')),
            terminal_state: pass(has('TERMINAL_STATE_VERIFICATION_OK')),
            overdue_failure: pass(has('OVERDUE_FAILURE_VERIFICATION_MANUAL_OK')),
            system_truth: pass(has('SYSTEM_TRUTH_VERIFICATION_OK')),
            guards: pass(has('GUARD_VERIFICATION_OK')),
            signals: pass(has('SIGNALS_VERIFICATION_OK')),
            security_advisor: pullRequest ? 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY' : pass(fs.existsSync('supabase-security.json')),
            vercel_deployment_ready: pullRequest ? 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY' : pass(fs.existsSync('vercel-ready.txt'))
          };

          checks.npm_run_prove = pass([
            checks.terminal_state,
            checks.overdue_failure,
            checks.system_truth,
            checks.guards,
            checks.signals
          ].every((value) => value === 'PASS'));

          const localPassed = [
            checks.npm_build,
            checks.supabase_local_replay,
            checks.npm_run_prove,
            checks.terminal_state,
            checks.overdue_failure,
            checks.system_truth,
            checks.guards,
            checks.signals
          ].every((value) => value === 'PASS');

          const productionPassed = pullRequest || (
            checks.security_advisor === 'PASS' && checks.vercel_deployment_ready === 'PASS'
          );

          const receiptStatus = localPassed && productionPassed ? 'PASS' : 'FAIL';
          const receiptKind = pullRequest ? 'pull_request_proof' : 'production_release';
          const receipt = {
            schema: 'autokirk.release_receipt.v3.startup_safe',
            doctrine: 'no_proof_no_closure_no_proof_no_deploy',
            receipt_id: `${receiptKind}:${env.GITHUB_REPOSITORY}:${env.GITHUB_SHA}:${env.GITHUB_RUN_ID}:${env.GITHUB_RUN_ATTEMPT}`,
            receipt_kind: receiptKind,
            status: receiptStatus,
            generated_at: new Date().toISOString(),
            repository: env.GITHUB_REPOSITORY,
            branch: env.GITHUB_REF_NAME,
            event_name: env.GITHUB_EVENT_NAME,
            run_id: env.GITHUB_RUN_ID,
            run_attempt: env.GITHUB_RUN_ATTEMPT,
            commit: env.GITHUB_SHA,
            actor: env.GITHUB_ACTOR,
            checks
          };

          receipt.receipt_hash = crypto.createHash('sha256').update(JSON.stringify(receipt)).digest('hex');

          const summaryLines = [
            'AUTOKIRK_PROOF_GATE_OK',
            '',
            `commit: ${env.GITHUB_SHA}`,
            `npm_build: ${checks.npm_build}`,
            `supabase_local_replay: ${checks.supabase_local_replay}`,
            `npm_run_prove: ${checks.npm_run_prove}`,
            `terminal_state: ${checks.terminal_state}`,
            `overdue_failure: ${checks.overdue_failure}`,
            `system_truth: ${checks.system_truth}`,
            `guards: ${checks.guards}`,
            `signals: ${checks.signals}`,
            `security_advisor: ${checks.security_advisor}`,
            `vercel_deployment_ready: ${checks.vercel_deployment_ready}`,
            `receipt_kind: ${receiptKind}`,
            `receipt_status: ${receiptStatus}`,
            `receipt_hash: ${receipt.receipt_hash}`
          ];

          fs.writeFileSync('autokirk-proof-gate-summary.txt', summaryLines.join('\n') + '\n');
          fs.writeFileSync('autokirk-release-receipt.json', JSON.stringify(receipt, null, 2) + '\n');
          fs.writeFileSync('autokirk-receipt-status.txt', receiptStatus + '\n');
          if (env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(env.GITHUB_STEP_SUMMARY, summaryLines.join('\n') + '\n');
          }
          NODE

      - name: Upload proof gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autokirk-proof-gate-${{ github.sha }}
          path: |
            prove-output.txt
            autokirk-proof-gate-summary.txt
            autokirk-release-receipt.json
            autokirk-receipt-status.txt
            supabase-security.json
            vercel-deployments.json
            vercel-ready.txt
          if-no-files-found: ignore

      - name: Enforce strict AutoKirk proof result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f autokirk-receipt-status.txt ]; then
            echo "Missing AutoKirk release receipt status artifact" >&2
            exit 1
          fi
          if [ "$(cat autokirk-receipt-status.txt)" != "PASS" ]; then
            echo "AutoKirk proof gate did not produce a PASS receipt" >&2
            cat autokirk-release-receipt.json >&2 || true
            exit 1
          fi

      - name: Stop local Supabase stack
        if: always()
        run: supabase stop --no-backup
