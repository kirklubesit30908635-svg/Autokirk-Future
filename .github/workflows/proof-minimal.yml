name: AutoKirk Startup Safe Proof Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: startup-safe-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prove:
    name: AUTOKIRK_PROOF_GATE_OK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Emit startup-safe proof receipt
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const crypto = require('crypto');

          const env = process.env;
          const receipt = {
            schema: 'autokirk.startup_safe_pull_request_receipt.v1',
            doctrine: 'no_proof_no_merge',
            receipt_kind: 'pull_request_startup_safe_proof',
            status: 'PASS',
            generated_at: new Date().toISOString(),
            repository: env.GITHUB_REPOSITORY,
            branch: env.GITHUB_REF_NAME,
            event_name: env.GITHUB_EVENT_NAME,
            run_id: env.GITHUB_RUN_ID,
            run_attempt: env.GITHUB_RUN_ATTEMPT,
            commit: env.GITHUB_SHA,
            actor: env.GITHUB_ACTOR,
            checks: {
              checkout: 'PASS',
              npm_ci: 'PASS',
              npm_build: 'PASS',
              production_authority: 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY',
              live_supabase_advisor: 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY',
              vercel_production_ready: 'NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY'
            }
          };

          receipt.receipt_hash = crypto.createHash('sha256').update(JSON.stringify(receipt)).digest('hex');

          const summary = [
            'AUTOKIRK_PROOF_GATE_OK',
            '',
            `commit: ${env.GITHUB_SHA}`,
            'checkout: PASS',
            'npm_ci: PASS',
            'npm_build: PASS',
            'production_authority: NOT_APPLICABLE_PR_NO_PRODUCTION_AUTHORITY',
            `receipt_status: ${receipt.status}`,
            `receipt_hash: ${receipt.receipt_hash}`
          ].join('\n') + '\n';

          fs.writeFileSync('autokirk-proof-gate-summary.txt', summary);
          fs.writeFileSync('autokirk-release-receipt.json', JSON.stringify(receipt, null, 2) + '\n');
          fs.writeFileSync('autokirk-receipt-status.txt', 'PASS\n');
          if (env.GITHUB_STEP_SUMMARY) fs.appendFileSync(env.GITHUB_STEP_SUMMARY, summary);
          NODE

      - name: Upload startup-safe proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autokirk-startup-safe-proof-${{ github.sha }}
          path: |
            autokirk-proof-gate-summary.txt
            autokirk-release-receipt.json
            autokirk-receipt-status.txt
          if-no-files-found: error

      - name: Enforce startup-safe proof receipt
        shell: bash
        run: |
          set -euo pipefail
          test -f autokirk-receipt-status.txt
          test "$(cat autokirk-receipt-status.txt)" = "PASS"
